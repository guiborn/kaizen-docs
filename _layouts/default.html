<!DOCTYPE html>
<html lang="{{ site.site_locale | default: 'pt-BR' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">

    {% seo %}
    {% feed_meta %}
    
    <style>
      :root {
        --theme-purple: #7c3aed;
        --theme-purple-light: #8b5cf6;
        --theme-purple-dark: #6d28d9;
        --text-dark: #1f2937;
        --text-light: #6b7280;
        --border-light: #e5e7eb;
        --bg-light: #f9fafb;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper">
        <div class="site-header-content">
          <a class="site-title" href="{{ '/' | relative_url }}">
            <img class="site-logo" src="{{ '/assets/images/Logo R_R-01.png' | relative_url }}" alt="{{ site.title }}" />
            <span class="site-title-text">{{ site.title }}</span>
          </a>
          <nav class="site-nav">
            {% include nav.html %}
          </nav>
        </div>
      </div>
    </header>

    <main class="page-content" aria-label="Conteúdo">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrapper">
        <h2 class="footer-heading">{{ site.title }}</h2>
        <div class="footer-col-wrapper">
          <div class="footer-col footer-col-1">
            <p>{{ site.description }}</p>
          </div>
          <div class="footer-col footer-col-2">
            <h3>Links</h3>
            <ul>
              <li><a href="https://github.com/{{ site.github_username }}">GitHub</a></li>
              <li><a href="https://github.com/{{ site.repository }}">Repositório</a></li>
            </ul>
          </div>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Kaizen. Documentação Técnica. Construído com <a href="https://jekyllrb.com/">Jekyll</a> e hospedado no <a href="https://pages.github.com/">GitHub Pages</a>.</p>
      </div>
    </footer>
  </body>
</html>
